components:
  securitySchemes:
    sigv4:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        AWS Signature Version 4 authentication. Requests must be signed with
        valid AWS credentials that have the appropriate Lambda IAM permissions.
  parameters:
    functionName:
      name: FunctionName
      in: path
      required: true
      description: >-
        The name, ARN, or partial ARN of the Lambda function. Can be a
        function name, a function ARN, or a partial ARN.
      schema:
        type: string
        minLength: 1
        maxLength: 170
    qualifier:
      name: Qualifier
      in: query
      description: A version number or alias name
      schema:
        type: string
        minLength: 1
        maxLength: 128
    aliasName:
      name: AliasName
      in: path
      required: true
      description: The name of the alias
      schema:
        type: string
        minLength: 1
        maxLength: 128
    eventSourceMappingUUID:
      name: UUID
      in: path
      required: true
      description: The identifier of the event source mapping
      schema:
        type: string
    layerName:
      name: LayerName
      in: path
      required: true
      description: The name or ARN of the layer
      schema:
        type: string
        minLength: 1
        maxLength: 140
    versionNumber:
      name: VersionNumber
      in: path
      required: true
      description: The version number
      schema:
        type: integer
    marker:
      name: Marker
      in: query
      description: >-
        A pagination token returned by a previous call. Use this token to
        retrieve the next page of results.
      schema:
        type: string
    maxItems:
      name: MaxItems
      in: query
      description: Maximum number of items to return (1-10000)
      schema:
        type: integer
        minimum: 1
        maximum: 10000
    masterRegion:
      name: MasterRegion
      in: query
      description: >-
        For Lambda@Edge functions, the AWS Region of the master function
      schema:
        type: string
    functionVersion:
      name: FunctionVersion
      in: query
      description: Set to ALL to include entries for all published versions
      schema:
        type: string
        enum:
        - ALL
  schemas:
    FunctionConfiguration:
      type: object
      description: A Lambda function's configuration and metadata
      properties:
        FunctionName:
          type: string
          description: The name of the function
          example: example_value
        FunctionArn:
          type: string
          description: The function's Amazon Resource Name (ARN)
          example: example_value
        Runtime:
          type: string
          description: >-
            The identifier of the function's runtime. Runtime is required if
            the deployment package is a .zip file archive.
          enum:
          - nodejs18.x
          - nodejs20.x
          - nodejs22.x
          - python3.9
          - python3.10
          - python3.11
          - python3.12
          - python3.13
          - java11
          - java17
          - java21
          - dotnet6
          - dotnet8
          - ruby3.2
          - ruby3.3
          - provided
          - provided.al2
          - provided.al2023
          example: nodejs18.x
        Role:
          type: string
          description: The function's execution role ARN
          example: example_value
        Handler:
          type: string
          description: >-
            The function entrypoint in your code. The format includes the file
            name without extension and the handler function name
            (e.g. index.handler)
          example: example_value
        CodeSize:
          type: integer
          description: The size of the function's deployment package in bytes
          format: int64
          example: 10
        Description:
          type: string
          description: The function's description
          example: A sample description.
        Timeout:
          type: integer
          description: >-
            The amount of time in seconds that Lambda allows a function to run
            before stopping it. Maximum is 900 seconds (15 minutes).
          minimum: 1
          maximum: 900
          example: 10
        MemorySize:
          type: integer
          description: >-
            The amount of memory available to the function at runtime in MB.
            Lambda allocates CPU power in proportion to the amount of memory
            configured.
          minimum: 128
          maximum: 10240
          example: 10
        LastModified:
          type: string
          description: >-
            The date and time the function was last updated in ISO 8601 format
          example: example_value
        CodeSha256:
          type: string
          description: The SHA-256 hash of the function's deployment package
          example: example_value
        Version:
          type: string
          description: The version of the Lambda function
          example: example_value
        VpcConfig:
          $ref: '#/components/schemas/VpcConfigResponse'
        DeadLetterConfig:
          type: object
          description: The function's dead-letter queue configuration
          properties:
            TargetArn:
              type: string
              description: The ARN of the SQS queue or SNS topic for failed events
          example: example_value
        Environment:
          type: object
          description: The function's environment variables
          properties:
            Variables:
              type: object
              additionalProperties:
                type: string
              description: Environment variable key-value pairs
            Error:
              type: object
