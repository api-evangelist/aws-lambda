openapi: 3.1.0
info:
  title: AWS Lambda API
  description: >-
    The AWS Lambda API enables you to create, configure, and manage Lambda
    functions, layers, event source mappings, aliases, versions, and function
    URLs programmatically. Lambda runs your code on high-availability compute
    infrastructure without provisioning or managing servers, performing all
    administration of compute resources including capacity provisioning,
    automatic scaling, and logging. The API version used is 2015-03-31.
  version: '2015-03-31'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/contact-us/
  termsOfService: https://aws.amazon.com/service-terms/
externalDocs:
  description: AWS Lambda API Reference
  url: https://docs.aws.amazon.com/lambda/latest/api/welcome.html
servers:
- url: https://lambda.{region}.amazonaws.com
  description: AWS Lambda Regional Endpoint
  variables:
    region:
      description: The AWS region for the Lambda service endpoint
      default: us-east-1
      enum:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-west-2
      - eu-west-3
      - eu-central-1
      - eu-north-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1
      - ap-northeast-2
      - ap-south-1
      - sa-east-1
      - ca-central-1
tags:
- name: Aliases
  description: Create named pointers to function versions with routing configuration
- name: Concurrency
  description: Manage reserved and provisioned concurrency settings for functions
- name: Event Source Mappings
  description: >-
    Map event sources such as Amazon SQS, Kinesis, and DynamoDB Streams to
    Lambda functions for automatic invocation
- name: Function URL
  description: >-
    Configure dedicated HTTPS endpoints for Lambda functions that can be
    invoked directly via HTTP
- name: Functions
  description: Create, configure, invoke, and manage Lambda functions
- name: Layers
  description: >-
    Manage Lambda layers that package libraries, custom runtimes, and other
    dependencies for sharing across functions
- name: Versions
  description: Publish and manage immutable function versions
security:
- sigv4: []
paths:
