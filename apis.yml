name: AWS Lambda
description: >-
  AWS Lambda is a serverless, event-driven compute service that lets you run
  code for virtually any type of application or backend service without
  provisioning or managing servers. Lambda runs your code on high-availability
  compute infrastructure and performs all of the administration of the compute
  resources, including server and operating system maintenance, capacity
  provisioning and automatic scaling, and logging.
