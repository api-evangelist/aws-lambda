    EventSourceMappingConfiguration:
      type: object
      description: >-
        A mapping between an AWS resource and a Lambda function. Lambda reads
        items from the event source and invokes the function.
      properties:
        UUID:
          type: string
          description: The identifier of the event source mapping
          example: '500123'
        StartingPosition:
          type: string
          description: >-
            The position in a stream from which to start reading
          enum:
          - TRIM_HORIZON
          - LATEST
          - AT_TIMESTAMP
          example: TRIM_HORIZON
        StartingPositionTimestamp:
          type: string
          format: date-time
          description: >-
            The time from which to start reading with AT_TIMESTAMP position
          example: '2026-01-15T10:30:00Z'
        BatchSize:
          type: integer
          description: >-
            The maximum number of records in each batch that Lambda pulls from
            the event source
          minimum: 1
          maximum: 10000
          example: 10
        MaximumBatchingWindowInSeconds:
          type: integer
          description: >-
            Maximum amount of time in seconds to gather records before
            invoking the function
          minimum: 0
          maximum: 300
          example: 10
        ParallelizationFactor:
          type: integer
          description: >-
            The number of batches to process concurrently from each shard
          minimum: 1
          maximum: 10
          example: 10
        EventSourceArn:
          type: string
          description: The ARN of the event source
          example: example_value
        FunctionArn:
          type: string
          description: The ARN of the Lambda function
          example: example_value
        LastModified:
          type: string
          format: date-time
          description: The date that the event source mapping was last updated
          example: '2026-01-15T10:30:00Z'
        LastProcessingResult:
          type: string
          description: The result of the last invocation
          example: example_value
        State:
          type: string
          description: The state of the event source mapping
          enum:
          - Creating
          - Enabling
          - Enabled
          - Disabling
          - Disabled
          - Updating
          - Deleting
          example: Creating
        StateTransitionReason:
          type: string
          description: The reason for the current state
          example: example_value
        DestinationConfig:
          $ref: '#/components/schemas/DestinationConfig'
        MaximumRecordAgeInSeconds:
          type: integer
          description: >-
            Maximum age of a record that Lambda sends to a function for
            processing (in seconds). For Kinesis and DynamoDB Streams only.
          minimum: -1
          maximum: 604800
          example: 10
        BisectBatchOnFunctionError:
          type: boolean
          description: >-
            If true, Lambda splits the batch in two and retries when a function
            returns an error
          example: true
        MaximumRetryAttempts:
          type: integer
          description: >-
            Maximum number of retry attempts for failed batches. -1 means
            infinite retries.
          minimum: -1
          maximum: 10000
          example: 10
        TumblingWindowInSeconds:
          type: integer
          description: >-
            The duration in seconds of a processing window for DynamoDB and
            Kinesis Streams event sources
          minimum: 0
          maximum: 900
          example: 10
        FunctionResponseTypes:
          type: array
          description: >-
            A list of current response type enums applied to the event source
            mapping
          items:
            type: string
            enum:
            - ReportBatchItemFailures
          example: []
        FilterCriteria:
          $ref: '#/components/schemas/FilterCriteria'
    CreateEventSourceMappingRequest:
      type: object
      required:
      - FunctionName
      description: Request body for creating an event source mapping
      properties:
        EventSourceArn:
          type: string
          description: >-
            The ARN of the event source. Required for Kinesis, DynamoDB
            Streams, SQS, MQ, MSK, and DocumentDB.
          example: example_value
        FunctionName:
          type: string
          description: The name or ARN of the Lambda function
          example: example_value
        Enabled:
          type: boolean
          description: If true, the event source mapping is active
          default: true
          example: true
        BatchSize:
          type: integer
          description: Maximum number of records in each batch
          minimum: 1
          maximum: 10000
          example: 10
        FilterCriteria:
          $ref: '#/components/schemas/FilterCriteria'
        MaximumBatchingWindowInSeconds:
          type: integer
          description: Maximum time to gather records before invoking
          minimum: 0
          maximum: 300
          example: 10
        ParallelizationFactor:
          type: integer
          description: Number of batches to process concurrently per shard
          minimum: 1
          maximum: 10
          example: 10
        StartingPosition:
          type: string
          description: Starting position in the stream
          enum:
          - TRIM_HORIZON
          - LATEST
          - AT_TIMESTAMP
          example: TRIM_HORIZON
        StartingPositionTimestamp:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        DestinationConfig:
          $ref: '#/components/schemas/DestinationConfig'
        MaximumRecordAgeInSeconds:
          type: integer
          minimum: -1
          maximum: 604800
          example: 10
        BisectBatchOnFunctionError:
          type: boolean
          example: true
        MaximumRetryAttempts:
          type: integer
          minimum: -1
          maximum: 10000
          example: 10
        TumblingWindowInSeconds:
          type: integer
          minimum: 0
          maximum: 900
          example: 10
        FunctionResponseTypes:
          type: array
          items:
            type: string
            enum:
            - ReportBatchItemFailures
          example: []
    UpdateEventSourceMappingRequest:
      type: object
