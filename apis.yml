- name: AWS Lambda Telemetry API
  description: >-
    The Lambda Telemetry API lets you collect telemetry data directly from the
    Lambda execution environment. Extensions can subscribe to telemetry streams
    for platform telemetry, function logs, and extension logs to send data to
    custom destinations for monitoring and observability.
