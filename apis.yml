    name: AWS Lambda Runtime API
    description: >-
      The Lambda Runtime API enables you to use custom runtimes to run functions in
      any programming language. The runtime API provides an HTTP API for custom
      runtimes to receive invocation events from Lambda and send response data
      back within the Lambda execution environment.
