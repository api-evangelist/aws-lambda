        Cors:
          $ref: '#/components/schemas/Cors'
        CreationTime:
          type: string
          description: When the function URL was created in ISO 8601 format
          example: example_value
        LastModifiedTime:
          type: string
          description: When the function URL was last modified
          example: example_value
        InvokeMode:
          type: string
          description: >-
            Use BUFFERED for synchronous invocation or RESPONSE_STREAM for
            response streaming
          enum:
          - BUFFERED
          - RESPONSE_STREAM
          example: BUFFERED
    CreateFunctionUrlConfigRequest:
      type: object
      required:
      - AuthType
      description: Request body for creating a function URL
      properties:
        AuthType:
          type: string
          description: >-
            The type of authentication. NONE allows public unauthenticated
