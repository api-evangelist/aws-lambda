  - aid: aws-lambda:aws-lambda-extensions-api
    name: AWS Lambda Extensions API
    description: >-
      The Lambda Extensions API enables you to create extensions that integrate
      with the Lambda execution environment lifecycle. Extensions can run as
      companion processes alongside your function, enabling use cases such as
      capturing diagnostic information, sending telemetry data, and integrating
      with monitoring and observability tools.
